name: Schedule Refactoring Audit With Copilot

on:
  schedule:
    # Runs monthly at 06:41 UTC on the first day of May, June, and July only.
    - cron: '41 6 1 5-7 *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AUDIT_TITLE_PREFIX: Scheduled refactoring audit

jobs:
  delegate-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit instructions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Confirm Copilot assignment token is configured
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        shell: bash
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "Repository secret COPILOT_AGENT_TOKEN is required to assign scheduled audits to Copilot cloud agent." >&2
            exit 1
          fi

      - name: Check for an outstanding refactoring audit
        id: pending
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        shell: bash
        run: |
          issue_url="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "${AUDIT_TITLE_PREFIX} in:title" --json url --jq '.[0].url')"
          if [[ -n "$issue_url" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "A refactoring audit is already awaiting review: ${issue_url}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delegate refactoring audit to Copilot
        if: steps.pending.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        shell: bash
        run: |
          audit_date="$(date -u +%Y-%m-%d)"
          request_json="$(jq -n \
            --arg title "${AUDIT_TITLE_PREFIX} - ${audit_date}" \
            --arg repo "$GITHUB_REPOSITORY" \
            --rawfile body .github/automation/refactoring-audit/audit-request.md \
            '{
              title: $title,
              body: $body,
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: "main",
                custom_instructions: "Follow the refactoring-auditor profile. Update docs/refactoring-plan.md only.",
                custom_agent: "refactoring-auditor",
                model: ""
              }
            }')"
          issue_url="$(gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "/repos/${GITHUB_REPOSITORY}/issues" \
            --input - \
            --jq '.html_url' <<< "$request_json")"
          echo "Delegated scheduled refactoring audit to Copilot: ${issue_url}" >> "$GITHUB_STEP_SUMMARY"