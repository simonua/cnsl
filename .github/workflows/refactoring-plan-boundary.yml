name: Validate Refactoring Plan Pull Request Boundary

on:
  pull_request:
    paths:
      - docs/refactoring-plan.md

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-plan-only-change:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request contents
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Validate documentation-only scope
        shell: bash
        run: |
          git show "origin/${GITHUB_BASE_REF}:scripts/validate-refactoring-audit-boundary.js" > "$RUNNER_TEMP/validate-refactoring-audit-boundary.js"
          git diff --name-status --find-renames "origin/${GITHUB_BASE_REF}...HEAD" | node "$RUNNER_TEMP/validate-refactoring-audit-boundary.js"
