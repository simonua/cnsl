name: Monitor Seasonal Data Sources

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:
    inputs:
      run_outside_season:
        description: Check public sources outside the active season dates
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  UPDATE_BRANCH: automation/season-source-updates

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Check for a pending source update pull request
        id: pending
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          pr_number="$(gh pr list --state open --base main --head "$UPDATE_BRANCH" --json number --jq '.[0].number')"
          if [[ -n "$pr_number" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "A seasonal source update pull request (#${pr_number}) is already awaiting review." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check official current-season sources
        id: source_monitor
        if: steps.pending.outputs.exists != 'true'
        env:
          RUN_OUTSIDE_SEASON: ${{ inputs.run_outside_season }}
        shell: bash
        run: |
          arguments=(--update --season-only)
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$RUN_OUTSIDE_SEASON" == "true" ]]; then
            arguments=(--update)
          fi
          node scripts/season-data-agent.js "${arguments[@]}"

      - name: Open source update pull request
        if: steps.source_monitor.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SEASON: ${{ steps.source_monitor.outputs.season }}
        shell: bash
        run: |
          if [[ ! "$SEASON" =~ ^[0-9]{4}$ ]]; then
            echo "Invalid season output: $SEASON" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$UPDATE_BRANCH"
          git add -- .github/data-agent/source-state.json .github/data-agent/update-report.md "src/assets/data/$SEASON"
          git commit -m "Update ${SEASON} official seasonal source material"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/$UPDATE_BRANCH"
          gh pr create \
            --base main \
            --head "$UPDATE_BRANCH" \
            --title "Review ${SEASON} official seasonal source updates" \
            --body-file .github/data-agent/update-report.md
