name: Monitor Seasonal Data Sources

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:
    inputs:
      run_outside_season:
        description: Check public sources outside the active season dates
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REVIEW_TITLE_PREFIX: Seasonal application data review

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Confirm Copilot assignment token is configured
        env:
          GH_TOKEN: ${{ secrets.CNSL_DATA_UPDATER_PR_TOKEN }}
        shell: bash
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "Repository secret CNSL_DATA_UPDATER_PR_TOKEN is required to assign seasonal data reviews to Copilot cloud agent." >&2
            exit 1
          fi

      - name: Check for a pending seasonal data review
        id: pending
        env:
          GH_TOKEN: ${{ secrets.CNSL_DATA_UPDATER_PR_TOKEN }}
        shell: bash
        run: |
          review_url="$(gh issue list --state open --search "${REVIEW_TITLE_PREFIX} in:title" --json url --jq '.[0].url')"
          if [[ -n "$review_url" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "A seasonal application-data review is already underway: ${review_url}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check official current-season sources
        id: source_monitor
        if: steps.pending.outputs.exists != 'true'
        env:
          RUN_OUTSIDE_SEASON: ${{ inputs.run_outside_season }}
        shell: bash
        run: |
          arguments=(--report --season-only)
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$RUN_OUTSIDE_SEASON" == "true" ]]; then
            arguments=(--report)
          fi
          node scripts/season-data-agent.js "${arguments[@]}"

      - name: Check whether the exact candidate was already reviewed
        id: duplicate
        if: steps.source_monitor.outputs.candidate_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.CNSL_DATA_UPDATER_PR_TOKEN }}
          CANDIDATE_KEY: ${{ steps.source_monitor.outputs.candidate_key }}
        shell: bash
        run: |
          if [[ ! "$CANDIDATE_KEY" =~ ^[0-9a-f]{16}$ ]]; then
            echo "Invalid candidate key: $CANDIDATE_KEY" >&2
            exit 1
          fi
          existing_url="$(gh issue list --state all --search "${CANDIDATE_KEY} in:title" --json url --jq '.[0].url')"
          if [[ -n "$existing_url" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "This exact candidate source difference was already sent for review: ${existing_url}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delegate represented-data review to Copilot
        if: steps.source_monitor.outputs.candidate_changed == 'true' && steps.duplicate.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.CNSL_DATA_UPDATER_PR_TOKEN }}
          CANDIDATE_KEY: ${{ steps.source_monitor.outputs.candidate_key }}
        shell: bash
        run: |
          review_date="$(date -u +%Y-%m-%d)"
          request_file="$RUNNER_TEMP/season-data-review-request.md"
          cat .github/automation/season-data-monitor/review-request.md .github/automation/season-data-monitor/update-report.md > "$request_file"
          request_json="$(jq -n \
            --arg title "${REVIEW_TITLE_PREFIX} [${CANDIDATE_KEY}] - ${review_date}" \
            --arg repo "$GITHUB_REPOSITORY" \
            --rawfile body "$request_file" \
            '{
              title: $title,
              body: $body,
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: "main",
                custom_instructions: "Follow the season-data-reviewer profile. Open a pull request only for a supported material annual-data or retained-document update.",
                custom_agent: "season-data-reviewer",
                model: ""
              }
            }')"
          issue_url="$(gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "/repos/${GITHUB_REPOSITORY}/issues" \
            --input - \
            --jq '.html_url' <<< "$request_json")"
          echo "Delegated candidate seasonal data review to Copilot: ${issue_url}" >> "$GITHUB_STEP_SUMMARY"