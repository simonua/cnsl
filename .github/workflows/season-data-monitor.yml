name: Monitor Seasonal Data Sources

on:
  schedule:
    # Runs daily at 05:17 UTC during May, June, and July only.
    - cron: '17 5 * 5-7 *'
  workflow_dispatch:
    inputs:
      run_outside_season:
        description: Check public sources outside the active season dates
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: season-data-monitor
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REVIEW_TITLE_PREFIX: Seasonal application data review

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Resolve the calendar season to monitor
        id: season
        shell: bash
        run: |
          target_year="$(date -u +%Y)"
          active_year="$(node -e "const config = require('node:fs').readFileSync('src/js/config/app-config.js', 'utf8'); const match = config.match(/\\bconst YEAR = (\\d{4});/); if (!match) process.exit(1); process.stdout.write(match[1]);")"
          echo "target_year=${target_year}" >> "$GITHUB_OUTPUT"
          echo "active_year=${active_year}" >> "$GITHUB_OUTPUT"
          if [[ "$target_year" == "$active_year" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Monitoring active ${active_year} seasonal sources during the ${target_year} May-July schedule window." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Season rollover required: scheduled runs for ${target_year} will not inspect or update active-year ${active_year} data." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check official current-season sources
        id: source_monitor
        if: steps.season.outputs.ready == 'true'
        env:
          RUN_OUTSIDE_SEASON: ${{ inputs.run_outside_season }}
        shell: bash
        run: |
          arguments=(--report --season-only)
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$RUN_OUTSIDE_SEASON" == "true" ]]; then
            arguments=(--report)
          fi
          node scripts/season-data-agent.js "${arguments[@]}"

      - name: Confirm Copilot rollover-task token is configured
        if: steps.season.outputs.ready != 'true'
        env:
          GH_TOKEN: ${{ secrets.CNSL_DATA_UPDATER_PR_TOKEN }}
        shell: bash
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "Repository secret CNSL_DATA_UPDATER_PR_TOKEN is required to start annual season-rollover tasks through the Agent Tasks API." >&2
            exit 1
          fi

      - name: Check for a target-year rollover already underway
        id: rollover_pending
        if: steps.season.outputs.ready != 'true'
        env:
          GH_TOKEN: ${{ secrets.CNSL_DATA_UPDATER_PR_TOKEN }}
          TARGET_YEAR: ${{ steps.season.outputs.target_year }}
        shell: bash
        run: |
          if [[ ! "$TARGET_YEAR" =~ ^[0-9]{4}$ ]]; then
            echo "Invalid target season: $TARGET_YEAR" >&2
            exit 1
          fi
          marker="CNSL season rollover [${TARGET_YEAR}]"
          tasks_file="$RUNNER_TEMP/season-rollover-tasks.jsonl"
          : > "$tasks_file"
          for archived in false true; do
            if ! task_ids="$(gh api \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "/agents/repos/${GITHUB_REPOSITORY}/tasks?per_page=100&sort=created_at&direction=desc&is_archived=${archived}" \
              --paginate \
              --jq '.tasks[].id')"; then
              echo "Unable to read Copilot Agent Tasks for ${GITHUB_REPOSITORY}. Replace CNSL_DATA_UPDATER_PR_TOKEN with a supported user token that has access to this repository and Agent tasks read/write permission." >&2
              exit 1
            fi
            while IFS= read -r task_id; do
              [[ -z "$task_id" ]] && continue
              gh api \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2026-03-10' \
                "/agents/repos/${GITHUB_REPOSITORY}/tasks/${task_id}" >> "$tasks_file"
            done <<< "$task_ids"
          done
          existing_url="$(jq -rs --arg marker "$marker" '
            [.[] | select(any(.sessions[]?; (.prompt // "") | contains($marker)))
              | select(.state | IN("queued", "in_progress", "idle", "waiting_for_user"))][0].html_url // empty'
            "$tasks_file")"
          if [[ -z "$existing_url" ]]; then
            while IFS= read -r pull_number; do
              open_pull_url="$(gh api \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "/repos/${GITHUB_REPOSITORY}/pulls/${pull_number}" \
                --jq 'select(.state == "open") | .html_url')"
              if [[ -n "$open_pull_url" ]]; then
                existing_url="$open_pull_url"
                break
              fi
            done < <(jq -rs --arg marker "$marker" '
              [.[] | select(any(.sessions[]?; (.prompt // "") | contains($marker))) | .artifacts[]? | select(.type == "pull") | .data.id] | .[]'
              "$tasks_file")
          fi
          if [[ -n "$existing_url" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "A ${TARGET_YEAR} rollover task or open pull request is already underway; no additional rollover task was created: ${existing_url}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Start target-year rollover preparation task
        if: steps.season.outputs.ready != 'true' && steps.rollover_pending.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.CNSL_DATA_UPDATER_PR_TOKEN }}
          ACTIVE_YEAR: ${{ steps.season.outputs.active_year }}
          TARGET_YEAR: ${{ steps.season.outputs.target_year }}
        shell: bash
        run: |
          request_json="$(jq -n \
            --arg active_year "$ACTIVE_YEAR" \
            --arg target_year "$TARGET_YEAR" \
            '{
              prompt: ("CNSL season rollover [" + $target_year + "]\n\nPrepare the " + $target_year + " annual CNSL data set. Follow `.github/skills/cnsl-season-rollover/SKILL.md` and `docs/annual-season-assets.md`. Scheduled monitoring has detected that `YEAR` is still " + $active_year + "; do not modify `src/assets/data/" + $active_year + "` while preparing the new season. Use only official " + $target_year + " sources; create `src/assets/data/" + $target_year + "` and activate `YEAR` only after required pool, meet, and team data are supported and validated. Open a pull request only when official " + $target_year + " material supports an actionable season preparation or activation update. If official data is not ready, make no repository changes and finish with that conclusion so a later scheduled run can retry."),
              base_ref: "main",
              create_pull_request: false
            }')"
          task_url="$(gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "/agents/repos/${GITHUB_REPOSITORY}/tasks" \
            --input - \
            --jq '.html_url' <<< "$request_json")"
          echo "Started an issue-free ${TARGET_YEAR} season-rollover preparation task: ${task_url}" >> "$GITHUB_STEP_SUMMARY"
          echo "No ${ACTIVE_YEAR} annual data was inspected or modified by this scheduled run." >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize source monitoring outcome
        if: steps.source_monitor.outcome == 'success'
        env:
          CANDIDATE_CHANGED: ${{ steps.source_monitor.outputs.candidate_changed }}
          CANDIDATE_KEY: ${{ steps.source_monitor.outputs.candidate_key }}
          SEASON: ${{ steps.source_monitor.outputs.season }}
          SKIPPED: ${{ steps.source_monitor.outputs.skipped }}
        shell: bash
        run: |
          if [[ "$SKIPPED" == "true" ]]; then
            echo "No sources checked: the ${SEASON} season is outside its configured active dates." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$CANDIDATE_CHANGED" != "true" ]]; then
            echo "Checked official sources for ${SEASON}: no candidate source differences detected and no review task or pull request was created." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Checked official sources for ${SEASON}: candidate source differences detected (${CANDIDATE_KEY}); checking whether this evidence has already been reviewed." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Confirm Copilot review-task token is configured
        if: steps.source_monitor.outputs.candidate_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.CNSL_DATA_UPDATER_PR_TOKEN }}
        shell: bash
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "Repository secret CNSL_DATA_UPDATER_PR_TOKEN is required to start seasonal Copilot review tasks through the Agent Tasks API." >&2
            exit 1
          fi

      - name: Check whether the exact candidate was already reviewed
        id: duplicate
        if: steps.source_monitor.outputs.candidate_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.CNSL_DATA_UPDATER_PR_TOKEN }}
          CANDIDATE_KEY: ${{ steps.source_monitor.outputs.candidate_key }}
        shell: bash
        run: |
          if [[ ! "$CANDIDATE_KEY" =~ ^[0-9a-f]{16}$ ]]; then
            echo "Invalid candidate key: $CANDIDATE_KEY" >&2
            exit 1
          fi
          tasks_file="$RUNNER_TEMP/season-data-agent-tasks.jsonl"
          : > "$tasks_file"
          for archived in false true; do
            if ! task_ids="$(gh api \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "/agents/repos/${GITHUB_REPOSITORY}/tasks?per_page=100&sort=created_at&direction=desc&is_archived=${archived}" \
              --paginate \
              --jq '.tasks[].id')"; then
              echo "Unable to read Copilot Agent Tasks for ${GITHUB_REPOSITORY}. Replace CNSL_DATA_UPDATER_PR_TOKEN with a supported user token that has access to this repository and Agent tasks read/write permission." >&2
              exit 1
            fi
            while IFS= read -r task_id; do
              [[ -z "$task_id" ]] && continue
              gh api \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2026-03-10' \
                "/agents/repos/${GITHUB_REPOSITORY}/tasks/${task_id}" >> "$tasks_file"
            done <<< "$task_ids"
          done
          existing_url="$(jq -rs --arg candidate_key "$CANDIDATE_KEY" \
            '[.[] | select(any(.sessions[]?; (.prompt // "") | contains($candidate_key)))][0].html_url // empty' \
            "$tasks_file")"
          if [[ -n "$existing_url" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "This exact candidate source difference already has a review task; no new task or pull request was created: ${existing_url}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Start represented-data review task
        if: steps.source_monitor.outputs.candidate_changed == 'true' && steps.duplicate.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.CNSL_DATA_UPDATER_PR_TOKEN }}
          CANDIDATE_KEY: ${{ steps.source_monitor.outputs.candidate_key }}
        shell: bash
        run: |
          request_file="$RUNNER_TEMP/season-data-review-request.md"
          {
            printf '%s [%s]\n\n' "$REVIEW_TITLE_PREFIX" "$CANDIDATE_KEY"
            cat .github/automation/season-data-monitor/review-request.md .github/automation/season-data-monitor/update-report.md
          } > "$request_file"
          request_json="$(jq -n \
            --rawfile prompt "$request_file" \
            '{
              prompt: $prompt,
              base_ref: "main",
              create_pull_request: false
            }')"
          task_url="$(gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "/agents/repos/${GITHUB_REPOSITORY}/tasks" \
            --input - \
            --jq '.html_url' <<< "$request_json")"
          echo "Started an issue-free seasonal data review task: ${task_url}" >> "$GITHUB_STEP_SUMMARY"
          echo "The reviewer will open a pull request only if it verifies an actionable modeled-data or visitor-facing source-link change." >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize failed monitor run
        if: failure()
        shell: bash
        run: echo "Seasonal source monitoring failed before it could complete a review decision; no conclusion about data changes should be drawn from this run." >> "$GITHUB_STEP_SUMMARY"