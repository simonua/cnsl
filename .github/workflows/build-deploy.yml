name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-deploy.yml'
      - 'src/**'
      - 'BingSiteAuth.xml'
      - 'browserconfig.xml'
      - 'CNAME'
      - 'google3dd9d57115818ebb.html'
      - 'LICENSE'
      - 'manifest.webmanifest'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'service-worker.js'
      - 'posthtml.js'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/adapters/app-config.js'
      - 'scripts/adapters/weather-alert-service.js'
      - 'scripts/lib/classic-script-loader.js'
      - 'scripts/lib/pwa-resource-policy.js'
      - 'scripts/validate-browser-javascript.js'
      - 'scripts/verify-pwa-build.js'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit high-severity dependencies
        run: pnpm audit --audit-level high

      - name: Lint source
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm test

      - name: Validate active annual data
        run: pnpm run validate:data

      - name: Build project
        env:
          CNSL_ANALYTICS_DEPLOYMENT: production
        run: pnpm run build

      - name: Verify PWA artifact contract
        env:
          CNSL_ANALYTICS_DEPLOYMENT: production
        run: pnpm run verify:pwa

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
