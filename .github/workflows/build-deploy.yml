name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-deploy.yml'
      - 'src/**'
      - 'browserconfig.xml'
      - 'CNAME'
      - 'LICENSE'
      - 'manifest.webmanifest'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'service-worker.js'
      - 'posthtml.js'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/adapters/app-config.js'
      - 'scripts/adapters/team-schedule-service.js'
      - 'scripts/adapters/weather-alert-service.js'
      - 'scripts/lib/classic-script-loader.js'
      - 'scripts/lib/development-server.js'
      - 'scripts/lib/entity-detail-pages.js'
      - 'scripts/lib/html-output.js'
      - 'scripts/lib/meet-date-summary.js'
      - 'scripts/lib/page-build-coordinator.js'
      - 'scripts/lib/package-version.js'
      - 'scripts/lib/pwa-resource-policy.js'
      - 'scripts/lib/search-directory-summary.js'
      - 'scripts/select-release.js'
      - 'scripts/validate-browser-javascript.js'
      - 'scripts/verify-pwa-build.js'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit high-severity dependencies
        run: pnpm audit --audit-level high

      - name: Lint source
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm test

      - name: Validate active annual data
        run: pnpm run validate:data

      - name: Build project
        env:
          CNSL_ANALYTICS_DEPLOYMENT: production
        run: pnpm run build

      - name: Verify PWA artifact contract
        env:
          CNSL_ANALYTICS_DEPLOYMENT: production
        run: pnpm run verify:pwa

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  tag-release:
    if: github.event_name == 'push'
    needs: deploy
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out deployed commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Select release tag
        id: release
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: node scripts/select-release.js

      - name: Record deployed version
        if: steps.release.outputs.should_tag == 'true'
        env:
          DEPLOY_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag --annotate "$RELEASE_VERSION" "$DEPLOY_SHA" --message "Release ${RELEASE_VERSION}"
          git push origin "refs/tags/${RELEASE_VERSION}"
