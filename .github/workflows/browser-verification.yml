name: Scheduled Test Verification

on:
  workflow_dispatch:
    inputs:
      worker_count:
        description: Playwright workers for a controlled reliability trial
        required: true
        default: auto
        type: choice
        options:
          - auto
          - '1'
          - '2'
  schedule:
    # Runs nightly at 05:47 UTC during May, June, and July only.
    - cron: '47 5 * 5-7 *'

permissions:
  actions: read
  contents: read
  issues: write

env:
  FAILURE_ISSUE_TITLE: Scheduled test verification failure
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TEST_VERIFICATION_RECIPIENT: simonua

jobs:
  browser-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Determine whether to run browser verification
        id: decision
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == 'workflow_dispatch' ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "Running browser verification requested through workflow dispatch." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          window_start="$(date --utc --date='7 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
          push_runs_json="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            --method GET \
            -f event='push' \
            -f branch='main' \
            -f created=">=${window_start}" \
            -f per_page=1 \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/build-deploy.yml/runs")"
          recent_push_run_count="$(jq -r '.total_count' <<< "$push_runs_json")"

          if (( recent_push_run_count > 0 )); then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "Running browser verification after a push to main in the last 7 days." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "Skipping browser verification: no push to main was recorded in the last 7 days." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout
        if: steps.decision.outputs.run_tests == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: steps.decision.outputs.run_tests == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - name: Setup Node.js
        if: steps.decision.outputs.run_tests == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.decision.outputs.run_tests == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run unit tests and enforce complete coverage
        if: steps.decision.outputs.run_tests == 'true'
        id: unit_coverage
        continue-on-error: true
        env:
          NO_COLOR: '1'
        shell: bash
        run: |
          set -o pipefail
          pnpm run test:coverage 2>&1 | tee "$RUNNER_TEMP/unit-coverage.log"

      - name: Build project for browser verification
        if: steps.decision.outputs.run_tests == 'true'
        run: pnpm run build

      - name: Install Chromium for browser verification
        if: steps.decision.outputs.run_tests == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser accessibility and workflow checks
        if: steps.decision.outputs.run_tests == 'true'
        id: browser_tests
        continue-on-error: true
        env:
          CNSL_PLAYWRIGHT_WORKERS: ${{ inputs.worker_count }}
          NO_COLOR: '1'
        shell: bash
        run: |
          set -o pipefail
          pnpm run test:browser:complete 2>&1 | tee "$RUNNER_TEMP/browser-tests.log"

      - name: Create or update scheduled test failure issue
        if: >-
          always() &&
          steps.decision.outputs.run_tests == 'true' &&
          (steps.unit_coverage.outcome == 'failure' || steps.browser_tests.outcome == 'failure')
        env:
          GH_TOKEN: ${{ github.token }}
          UNIT_COVERAGE_OUTCOME: ${{ steps.unit_coverage.outcome }}
          BROWSER_TESTS_OUTCOME: ${{ steps.browser_tests.outcome }}
        shell: bash
        run: |
          report="$RUNNER_TEMP/test-verification-issue.md"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          {
            printf 'Scheduled test verification failed. Please review the failing gate and its log excerpt below.\n\n'
            printf -- '- Commit: `%s`\n' "$GITHUB_SHA"
            printf -- '- Unit tests and 100%% coverage gate: **%s**\n' "$UNIT_COVERAGE_OUTCOME"
            printf -- '- Browser workflow and accessibility tests: **%s**\n' "$BROWSER_TESTS_OUTCOME"
            printf -- '- Workflow run: %s\n' "$run_url"
          } > "$report"

          append_log() {
            local label="$1"
            local log_path="$2"
            {
              printf '\n<details><summary>%s log excerpt</summary>\n\n' "$label"
              printf '```text\n'
              if [[ -f "$log_path" ]]; then
                tail -n 100 "$log_path"
              else
                printf 'No log was produced. Inspect the linked workflow run.\n'
              fi
              printf '```\n\n</details>\n'
            } >> "$report"
          }

          if [[ "$UNIT_COVERAGE_OUTCOME" == 'failure' ]]; then
            append_log 'Unit tests and coverage' "$RUNNER_TEMP/unit-coverage.log"
          fi
          if [[ "$BROWSER_TESTS_OUTCOME" == 'failure' ]]; then
            append_log 'Browser tests' "$RUNNER_TEMP/browser-tests.log"
          fi

          issue_url="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "\"${FAILURE_ISSUE_TITLE}\" in:title" \
            --limit 100 \
            --json title,url \
            --jq ".[] | select(.title == \"${FAILURE_ISSUE_TITLE}\") | .url" | head -n 1)"

          if [[ -z "$issue_url" ]]; then
            issue_url="$(gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$FAILURE_ISSUE_TITLE" \
              --body-file "$report" \
              --assignee "$TEST_VERIFICATION_RECIPIENT")"
          else
            gh issue comment "$issue_url" --body-file "$report"
            gh issue edit "$issue_url" --add-assignee "$TEST_VERIFICATION_RECIPIENT"
          fi

          printf 'Failure issue: %s\n' "$issue_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Close resolved scheduled test failure issue
        if: >-
          always() &&
          steps.decision.outputs.run_tests == 'true' &&
          steps.unit_coverage.outcome == 'success' &&
          steps.browser_tests.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          issue_url="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "\"${FAILURE_ISSUE_TITLE}\" in:title" \
            --limit 100 \
            --json title,url \
            --jq ".[] | select(.title == \"${FAILURE_ISSUE_TITLE}\") | .url" | head -n 1)"

          if [[ -n "$issue_url" ]]; then
            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            gh issue close "$issue_url" --comment "Resolved by a successful scheduled verification run: ${run_url}"
            printf 'Closed resolved failure issue: %s\n' "$issue_url" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail scheduled test verification
        if: >-
          always() &&
          steps.decision.outputs.run_tests == 'true' &&
          (steps.unit_coverage.outcome == 'failure' || steps.browser_tests.outcome == 'failure')
        run: exit 1
