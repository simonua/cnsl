name: Nightly Browser Verification

on:
  workflow_dispatch:
    inputs:
      worker_count:
        description: Playwright workers for a controlled reliability trial
        required: true
        default: auto
        type: choice
        options:
          - auto
          - '1'
          - '2'
  schedule:
    # Runs daily at 05:47 UTC during May, June, and July only.
    - cron: '47 5 * 5-7 *'

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  browser-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Determine whether to run browser verification
        id: decision
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == 'workflow_dispatch' ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "Running browser verification requested through workflow dispatch." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          window_start="$(date --utc --date='24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')"
          push_runs_json="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            --method GET \
            -f event='push' \
            -f branch='main' \
            -f created=">=${window_start}" \
            -f per_page=1 \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/build-deploy.yml/runs")"
          recent_push_run_count="$(jq -r '.total_count' <<< "$push_runs_json")"

          if (( recent_push_run_count > 0 )); then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "Running browser verification after a push to main in the last 24 hours." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "Skipping browser verification: no push to main was recorded in the last 24 hours." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout
        if: steps.decision.outputs.run_tests == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: steps.decision.outputs.run_tests == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10

      - name: Setup Node.js
        if: steps.decision.outputs.run_tests == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.decision.outputs.run_tests == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build project for browser verification
        if: steps.decision.outputs.run_tests == 'true'
        run: pnpm run build

      - name: Install Chromium for browser verification
        if: steps.decision.outputs.run_tests == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser accessibility and workflow checks
        if: steps.decision.outputs.run_tests == 'true'
        env:
          CNSL_PLAYWRIGHT_WORKERS: ${{ inputs.worker_count }}
        run: pnpm run test:browser:nightly
