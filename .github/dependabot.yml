version: 2
updates:
  # The npm ecosystem covers package.json and the pnpm lockfile.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      # Resume daily update checks during the May-July maintenance window only.
      interval: cron
      cronjob: "0 9 * 5-7 *"
      timezone: "America/New_York"
    groups:
      node-packages:
        patterns:
          - "*"

  # Actions are pinned to SHAs with release comments so updates stay immutable.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      # Resume daily update checks during the May-July maintenance window only.
      interval: cron
      cronjob: "0 9 * 5-7 *"
      timezone: "America/New_York"
    groups:
      github-actions:
        patterns:
          - "*"