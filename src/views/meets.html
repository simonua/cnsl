<extends src="base.html">
  <block name="metadata">
    <title>{{ YEAR }} CNSL Swim Meet Schedule</title>
    <meta name="analytics-page-title" content="Meets" />
    <meta name="description" content="Check the published {{ YEAR }} Columbia Neighborhood Swim League regular and special meet schedule with pool location links in Columbia, Maryland." />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="{{ HOME_PAGE_URL }}/meets.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ YEAR }} CNSL Swim Meet Schedule" />
    <meta property="og:description" content="Check the published {{ YEAR }} Columbia Neighborhood Swim League regular and special meet schedule with pool location links in Columbia, Maryland." />
    <meta property="og:url" content="{{ HOME_PAGE_URL }}/meets.html" />
    <meta name="twitter:title" content="{{ YEAR }} CNSL Swim Meet Schedule" />
    <meta name="twitter:description" content="Check the published {{ YEAR }} Columbia Neighborhood Swim League regular and special meet schedule with pool location links in Columbia, Maryland." />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "{{ YEAR }} CNSL Swim Meet Schedule",
        "url": "{{ HOME_PAGE_URL }}/meets.html",
        "description": "Published regular and special Columbia Neighborhood Swim League meet schedules for {{ YEAR }}.",
        "isPartOf": { "@id": "{{ HOME_PAGE_URL }}/#website" },
        "about": { "@type": "SportsEvent", "name": "CNSL swim meets" }
      }
    </script>
  </block>
  <block name="content">
    <h1 data-seasonal-content>{{ YEAR }} Meet Schedule</h1>
    <h1 data-off-season-content hidden>Meet Schedule</h1>
    <include src="components/off-season-message.html"></include>
    <div class="container">
      <div class="cnsl-link-section">
        <div class="cnsl-link-card">
          <h2><svg class="icon icon--heading" aria-hidden="true" focusable="false"><use href="#icon-clipboard-list"></use></svg> Swim Meet Resources</h2>
          <p>Need help with meet operations? Access essential resources, guides, and templates for judges, timers, and timesheet runners.</p>
          <a href="swim-meet-resources.html" class="cnsl-link-btn">
            View Resources
          </a>
        </div>
      </div>

      <div data-seasonal-content>
        <p class="visually-hidden" id="meetListStatus" role="status" aria-live="polite">Loading meet schedule.</p>
        <div id="meetList" class="meet-list" aria-busy="true">
          <!-- Meets will be loaded dynamically via JavaScript -->
        </div>
      </div>
    </div>
  </block>

  <block name="scripts">
    <!-- Summary dependencies load before the directory controller. -->
    <script src="js/services/time-utils.js"></script>
    <script src="js/types/schedule-state.js"></script>
    <script src="js/services/html-safety.js"></script>
    <script src="js/models/meet.js"></script>
    <script src="js/managers/meets-manager.js"></script>
    <script src="js/services/data-manager.js"></script>

    <!-- Fetch paths and the controller preserve their dependency order. -->
    <script src="js/services/file-helper.js" defer></script>
    <script src="js/meets-browser.js" defer></script>
  </block>
</extends>
