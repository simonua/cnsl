<section class="weather-alert" id="weatherAlert" role="alert" aria-label="Weather safety alert" hidden>
  <div class="weather-alert__inner">
    <div class="weather-alert__details" id="weatherAlertDetails">
      <div class="weather-alert__copy">
        <strong class="weather-alert__title">Weather safety alert</strong>
        <p class="weather-alert__message" id="weatherAlertMessage"></p>
        <p class="weather-alert__updated">Last updated <time id="weatherAlertUpdated"></time></p>
      </div>
    </div>
    <a class="weather-alert__link" href="https://experience.arcgis.com/experience/ac58c73ab9bd4640a880c8ddf46bf198" target="_blank" rel="noopener noreferrer">View live CA pool status</a>
    <button class="weather-alert__toggle" id="weatherAlertToggle" type="button" aria-expanded="true" aria-controls="weatherAlertDetails" aria-label="Collapse weather safety alert" title="Collapse weather safety alert">
      <span class="weather-alert__toggle-icon" aria-hidden="true">&#9650;</span>
    </button>
  </div>
</section>
<script>
  (function showCachedWeatherAlertBeforePaint() {
    try {
      const refreshMinutes = typeof PreferencesService === 'undefined' ? 5 : PreferencesService.get().weatherRefreshMinutes;
      if (refreshMinutes === 0) return;
      const cached = JSON.parse(sessionStorage.getItem('cnsl_weather_alert_status'));
      const status = cached && cached.status;
      if (!cached || cached.refreshMinutes !== refreshMinutes || cached.expiresAt <= Date.now() || !status || !status.isInclement) return;

      const banner = document.getElementById('weatherAlert');
      const toggle = document.getElementById('weatherAlertToggle');
      const message = document.getElementById('weatherAlertMessage');
      const updated = document.getElementById('weatherAlertUpdated');
      const isExpanded = sessionStorage.getItem('cnsl_weather_alert_expanded') !== 'false';
      const actionLabel = `${isExpanded ? 'Collapse' : 'Expand'} weather safety alert`;
      const updatedAt = new Date(status.updatedAt);

      message.textContent = status.message;
      updated.dateTime = status.updatedAt;
      updated.textContent = new Intl.DateTimeFormat('en-US', {
        hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York', timeZoneName: 'short'
      }).format(updatedAt);
      banner.classList.toggle('weather-alert--collapsed', !isExpanded);
      toggle.setAttribute('aria-expanded', String(isExpanded));
      toggle.setAttribute('aria-label', actionLabel);
      toggle.title = actionLabel;
      banner.hidden = false;
    } catch (_error) {
      return;
    }
  }());
</script>
<header class="header">
  <a href="index.html" aria-label="Home">
    <img src="assets/images/cnsl-logo.jpg" alt="CNSL Logo" class="logo" />
  </a>
  <p class="site-title" id="site-title">CA Pool &amp; CNSL Assistant</p>
  <button class="hamburger" type="button" aria-label="Open navigation menu" aria-controls="navMenu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>
