<header class="header">
  <a href="index.html" aria-label="Home">
    <img src="assets/images/cnsl-logo.jpg" alt="CNSL Logo" class="logo" />
  </a>
  <p class="site-title" id="site-title">CA Pool &amp; CNSL Assistant</p>
  <button class="hamburger" type="button" aria-label="Open navigation menu" aria-controls="navMenu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>
<section class="weather-alert" id="weatherAlert" role="alert" aria-label="Weather alert" hidden>
  <div class="weather-alert__inner">
    <div class="weather-alert__copy">
      <strong class="weather-alert__title">
        <svg class="weather-alert__warning-icon" aria-hidden="true" focusable="false" viewBox="0 0 24 24"><path d="M12 3 1.8 20.5h20.4L12 3Z" /><path d="M12 9v5" /><path d="M12 17.25v0.25" /></svg>
        <span>Weather alert</span>
      </strong>
      <div class="weather-alert__details" id="weatherAlertDetails">
        <p class="weather-alert__message" id="weatherAlertMessage"></p>
        <p class="weather-alert__updated">Last updated <time id="weatherAlertUpdated"></time></p>
        <a class="weather-alert__link" href="{{ EXTERNAL_LINKS.CA_POOL_DIRECTORY }}" target="_blank" rel="noopener noreferrer">
          <span class="weather-alert__live-indicator" aria-hidden="true"></span>
          <span>Live pool status<span class="visually-hidden"> (opens in new tab)</span></span>
        </a>
      </div>
    </div>
    <button class="weather-alert__toggle" id="weatherAlertToggle" type="button" aria-expanded="true" aria-controls="weatherAlertDetails" aria-label="Collapse weather safety alert" title="Collapse weather safety alert">
      <span class="weather-alert__toggle-icon" aria-hidden="true">&#9650;</span>
    </button>
  </div>
</section>
<script src="js/weather-alert-cached.js"></script>
