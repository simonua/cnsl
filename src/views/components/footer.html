<footer class="footer" data-analytics-context="project_information">
  <p>
    <a href="contact.html">{{ AUTHOR_NAME }}</a> |
    <a id="footerAppVersion" href="{{ APP_VERSION_WHATS_NEW_URL }}">{{ APP_VERSION }}</a>
  </p>
  <p class="footer__data-freshness">
    <strong>Data last checked:</strong> <time datetime="{{ OFFICIAL_SOURCE_CHECKED_AT }}">{{ OFFICIAL_SOURCE_CHECKED_SHORT_LABEL }}</time> |
    <strong>last updated:</strong> <time datetime="{{ OFFICIAL_SOURCE_UPDATED_AT }}">{{ OFFICIAL_SOURCE_UPDATED_SHORT_LABEL }}</time>
  </p>
  <p class="footer__data-freshness footer__weather-freshness" id="footerWeatherFreshness" aria-hidden="true">
    <strong>Last weather update:</strong>
    <time id="footerWeatherUpdated"></time>
  </p>
</footer>
