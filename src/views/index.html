<extends src="base.html">
  <block name="content">
    <div class="welcome-section">
      <h1 class="welcome-title">Welcome to the 2026 Outdoor Pool Season</h1>
      <p class="welcome-message">
        Find Columbia Association pool information and CNSL team and meet schedules in one place.<br>
        Please verify schedule details with official CA and CNSL sources.
      </p>
    </div>
    <section class="install-app" id="installApp" aria-label="Install app" hidden>
      <button class="install-app__button" id="installAppButton" type="button">Install app</button>
      <p class="install-app__instructions" id="iosInstallInstructions" tabindex="-1" hidden>
        On iPhone or iPad, open this page in Safari if needed, tap Share, then tap Add to Home Screen.
      </p>
    </section>
    <!-- <include src="components/search.html"></include> -->
    <include src="components/quick-links.html"></include>
  </block>

  <block name="scripts">
    <script src="js/install-app.js" defer></script>
  </block>
</extends>
