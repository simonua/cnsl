<extends src="base.html">
  <block name="metadata">
    <title>Columbia Association Outdoor Pools | {{ YEAR }} Pool Directory</title>
    <meta name="description" content="Browse Columbia Association outdoor pools in Columbia, MD, with facility features and published schedule details for the {{ YEAR }} season." />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://pools.longreachmarlins.org/pools.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Columbia Association Outdoor Pools | {{ YEAR }} Pool Directory" />
    <meta property="og:description" content="Browse Columbia Association outdoor pools in Columbia, MD, with facility features and published schedule details for the {{ YEAR }} season." />
    <meta property="og:url" content="https://pools.longreachmarlins.org/pools.html" />
    <meta name="twitter:title" content="Columbia Association Outdoor Pools | {{ YEAR }} Pool Directory" />
    <meta name="twitter:description" content="Browse Columbia Association outdoor pools in Columbia, MD, with facility features and published schedule details for the {{ YEAR }} season." />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "Columbia Association Outdoor Pools",
        "url": "https://pools.longreachmarlins.org/pools.html",
        "description": "Columbia Association outdoor pools with published {{ YEAR }} schedule and facility information in Columbia, Maryland.",
        "isPartOf": { "@id": "https://pools.longreachmarlins.org/#website" },
        "about": { "@type": "Thing", "name": "Columbia Association outdoor pools" }
      }
    </script>
  </block>
  <block name="content">
    <h1>Outdoor Pool Directory</h1>
    <div class="container container--pools">
      <section class="pool-filter" id="poolFeatureFilter" aria-label="Pool feature filters" hidden>
        <div class="pool-filter__header">
          <button type="button" class="pool-filter__toggle" id="togglePoolFeatureFilters" aria-expanded="false" aria-controls="poolFeatureFilterControls">
            <span class="pool-filter__indicator" aria-hidden="true">+</span>
            <span class="pool-filter__title">Features</span>
            <span class="pool-filter__count" id="poolFeatureFilterCount" hidden></span>
          </button>
          <div class="pool-filter__status">
            <p class="pool-filter__summary" id="poolFilterSummary" aria-live="polite"></p>
            <button type="button" class="pool-filter__clear" id="clearPoolFeatureFilters" hidden>Clear</button>
          </div>
        </div>
        <div class="pool-filter__controls" id="poolFeatureFilterControls" hidden>
            <section class="pool-sort" id="poolSortControls" aria-label="Pool sorting" hidden>
              <label class="pool-sort__label" for="poolSortOrder">Sort pools by</label>
              <select class="pool-sort__select" id="poolSortOrder" name="poolSortOrder">
                <option value="name">Default order</option>
                <option value="distance">Nearest distance</option>
              </select>
            </section>
            <fieldset class="pool-filter__fieldset">
              <legend class="visually-hidden">Select features required at a pool</legend>
              <div class="pool-filter__options" id="poolFeatureFilterOptions"></div>
            </fieldset>
        </div>
      </section>
      <p class="visually-hidden" id="poolListStatus" role="status" aria-live="polite">Loading pool information.</p>
      <div id="poolList" class="pool-list" aria-busy="true">
        <!-- Pools will be loaded dynamically via JavaScript -->
        <p class="loading">Loading pool information...</p>
      </div>
      <div class="season-info" id="seasonInfo" hidden></div>
    </div>
  </block>
  
  <block name="scripts">
    <!-- Critical dependencies must load synchronously to ensure availability -->
    <script src="js/services/time-utils.js"></script>
    <script src="js/types/pool-enums.js"></script>
    <script src="js/pool-schedule.js"></script>
    <script src="js/services/pool-schedule-display.js"></script>
    <script src="js/services/html-safety.js"></script>
    <script src="js/services/pool-link-helper.js"></script>
    <script src="js/models/pool.js"></script>
    <script src="js/pools-manager.js"></script>
    <script src="js/services/data-manager.js"></script>
    
    <!-- Other services can load deferred -->
    <script src="js/services/file-helper.js" defer></script>
    <!-- Application scripts -->
    <script src="js/pool-browser.js" defer></script>
  </block>
</extends>
