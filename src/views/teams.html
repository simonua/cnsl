<extends src="base.html">
  <block name="metadata">
    <title>Teams</title>
    <meta name="description" content="Browse Columbia Neighborhood Swim League (CNSL) team details and published practice information for the {{ YEAR }} swim season in Columbia, MD." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="{{ HOME_PAGE_URL }}/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Teams" />
    <meta property="og:description" content="Browse Columbia Neighborhood Swim League (CNSL) team details and published practice information for the {{ YEAR }} swim season in Columbia, MD." />
    <meta property="og:url" content="{{ HOME_PAGE_URL }}/teams.html" />
    <meta name="twitter:title" content="Teams" />
    <meta name="twitter:description" content="Browse Columbia Neighborhood Swim League (CNSL) team details and published practice information for the {{ YEAR }} swim season in Columbia, MD." />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "CNSL Swim Teams in Columbia, Maryland",
        "url": "{{ HOME_PAGE_URL }}/teams.html",
        "description": "Columbia Neighborhood Swim League team details and published practice information for the {{ YEAR }} season.",
        "isPartOf": { "@id": "{{ HOME_PAGE_URL }}/#website" },
        "about": { "@type": "SportsOrganization", "name": "Columbia Neighborhood Swim League" }
      }
    </script>
  </block>
  <block name="content">
    <h1>Team Directory</h1>
    <include src="components/off-season-message.html"></include>
    <div class="container">
      <div class="cnsl-link-section">
        <div class="cnsl-link-card">
          <h2><svg class="icon icon--heading" aria-hidden="true" focusable="false"><use href="#icon-swimmer"></use></svg> Columbia Neighborhood Swim League</h2>
          <a href="{{ EXTERNAL_LINKS.OFFICIAL_CNSL_SITE }}" target="_blank" rel="noopener noreferrer" class="cnsl-link-btn" data-analytics-context="official_information">
            Visit Official CNSL Site for additional information
          </a>
        </div>
      </div>
      <div data-seasonal-content>
        <p class="visually-hidden" id="teamListStatus" role="status" aria-live="polite">Loading team information.</p>
        <div id="teamList" class="team-list" aria-busy="true">
          <!-- Teams will be loaded dynamically via JavaScript -->
        </div>
      </div>
    </div>
  </block>

  <block name="scripts">
    <!-- Critical dependencies must load synchronously to ensure availability -->
    <script src="js/services/time-utils.js"></script>
    <script src="js/types/pool-enums.js"></script>
    <script src="js/types/schedule-state.js"></script>
    <script src="js/models/pool-schedule.js"></script>
    <script src="js/services/pool-period-schedule-service.js"></script>
    <script src="js/services/html-safety.js"></script>
    <script src="js/services/pool-link-helper.js"></script>
    <script src="js/services/team-schedule-service.js"></script>
    <script src="js/models/pool.js"></script>
    <script src="js/models/team.js"></script>
    <script src="js/models/meet.js"></script>
    <script src="js/managers/pools-manager.js"></script>
    <script src="js/managers/teams-manager.js"></script>
    <script src="js/managers/meets-manager.js"></script>
    <script src="js/services/data-manager.js"></script>
    <script src="js/services/team-agenda-display.js"></script>

    <!-- Other services can load deferred -->
    <script src="js/services/file-helper.js" defer></script>

    <!-- Application scripts -->
    <script src="js/teams-browser.js" defer></script>
  </block>
</extends>
