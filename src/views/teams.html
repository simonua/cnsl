    <meta property="og:title" content="CNSL Swim Teams in Columbia, MD | {{ YEAR }} Directory" />

    <script type="application/ld+json">

        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "CNSL Swim Teams in Columbia, Maryland",
        "url": "https://cnsl.longreachmarlins.org/teams.html",

        <!-- Teams will be loaded dynamically via JavaScript -->
        <p class="loading">Loading team information...</p>
      </div>
    </div>
  </block>
  
  <block name="scripts">
    <!-- Critical dependencies must load synchronously to ensure availability -->
    <script src="js/services/time-utils.js"></script>
