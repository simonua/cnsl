<!DOCTYPE html>
<html lang="en" data-season-end-date="{{ ACTIVE_SEASON.END_DATE_ON }}">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="{{ ANALYTICS_DEPLOYMENT_META_NAME }}" content="{{ ANALYTICS_DEPLOYMENT_MODE }}" />
  <meta http-equiv="Content-Security-Policy" content=
    "default-src 'self';
    base-uri 'self';
    connect-src 'self' {{ WEATHER_API_BASE_URL }} https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://cloudflareinsights.com;
    frame-src 'self';
    img-src 'self' data: https://*.google-analytics.com https://www.googletagmanager.com;
    manifest-src 'self';
    object-src 'none';
    script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://static.cloudflareinsights.com;
    style-src 'self' 'sha256-on/s0JcmGmF56O8YQCeGEyP1/ZNrx9TBo3VtIiMDwP0=';
    worker-src 'self';" />

  <!-- Runs before stylesheets so the first painted canvas matches the saved theme. -->
  <script data-cfasync="false" data-theme-bootstrap="true">
    let selectedTheme = 'system';
    try {
      const storedPreferences = JSON.parse(localStorage.getItem('{{ PREFERENCES_STORAGE_KEY }}') || '{}');
      if (storedPreferences.theme === 'light' || storedPreferences.theme === 'dark') {
        selectedTheme = storedPreferences.theme;
      }
    } catch {}
    const selectedColorScheme = selectedTheme === 'system'
      ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      : selectedTheme;
    document.documentElement.dataset.theme = selectedTheme;
    document.documentElement.dataset.colorScheme = selectedColorScheme;
  </script>

  <!-- Resolve a saved start page before the initial page can paint. -->
  <script src="js/types/start-page.js"></script>
  <script src="js/start-page-redirect.js" data-preferences-storage-key="{{ PREFERENCES_STORAGE_KEY }}"></script>

  <!-- Minimal first-paint styles; the CSP hash is validated during the build. -->
  <style data-initial-canvas="true">
    :root {
      --initial-page-background: #f8f9fa;
      --initial-header-end: #004578;
      --initial-header-start: #005ea8;
      --initial-header-text: #ffffff;
      --initial-page-text: #212529;
      background-color: var(--initial-page-background);
      color-scheme: light;
    }

    :root[data-color-scheme="dark"] {
      --initial-page-background: #101820;
      --initial-header-end: #115686;
      --initial-header-start: #176cae;
      --initial-header-text: #f1f5f8;
      --initial-page-text: #f1f5f8;
      color-scheme: dark;
    }

    body {
      background-color: var(--initial-page-background);
      color: var(--initial-page-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      margin: 0;
    }

    .header {
      align-items: center;
      background: linear-gradient(135deg, var(--initial-header-start), var(--initial-header-end));
      box-sizing: border-box;
      color: var(--initial-header-text);
      display: flex;
      justify-content: space-between;
      left: 0;
      min-height: 4.625rem;
      padding: 0.75rem 1rem;
      position: fixed;
      right: 0;
      top: 0;
      width: 100%;
      z-index: 1001;
    }

    .header a {
      align-items: center;
      color: inherit;
      display: flex;
      text-decoration: none;
    }

    .header .logo {
      border-radius: 8px;
      height: 50px;
      width: auto;
    }

    .header .site-title {
      flex: 1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
      text-align: center;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .header__actions {
      align-items: center;
      display: flex;
      flex: 0 0 auto;
      gap: 0.25rem;
    }

    @media (min-width: 40rem) {
      .header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      }

      .header > a[aria-label="Home"] {
        grid-column: 1;
        justify-self: start;
      }

      .header .site-title {
        grid-column: 2;
      }

      .header__actions {
        grid-column: 3;
        justify-self: end;
      }
    }

    .header .header-install-link[hidden] {
      display: none;
    }

    .hamburger {
      background: transparent;
      border: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      height: 44px;
      justify-content: space-between;
      min-width: 44px;
      padding: 13px 10px;
      width: 44px;
    }

    .hamburger span {
      background: var(--initial-header-text);
      display: block;
      height: 3px;
      width: 100%;
    }

    .page-wrap {
      padding-top: 4.625rem;
    }

    .nav-menu {
      position: absolute;
      visibility: hidden;
    }

    @media (max-width: 48rem) {
      .header {
        min-height: 5.5rem;
      }

      .page-wrap {
        padding-top: 5.5rem;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-color-scheme="light"]) {
        --initial-page-background: #101820;
        --initial-header-end: #115686;
        --initial-header-start: #176cae;
        --initial-header-text: #f1f5f8;
        --initial-page-text: #f1f5f8;
        color-scheme: dark;
      }
    }
  </style>

  <link rel="stylesheet" href="css/styles.css" />

  <!-- Route templates replace this metadata block with page-specific search content. -->
  <block name="metadata">
    <title>CA Outdoor Pools &amp; CNSL Swim Teams</title>
    <meta name="description" content="Find Columbia Association outdoor pools and CNSL swim teams for summer swimming in Columbia, Maryland." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="{{ HOME_PAGE_URL }}/" />
  </block>
  <meta property="og:site_name" content="CA Pool &amp; CNSL Assistant" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:image" content="{{ HOME_PAGE_URL }}/assets/images/cnsl-logo.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="230" />
  <meta property="og:image:height" content="180" />
  <meta property="og:image:alt" content="CNSL Columbia Neighborhood Swim League logo" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="{{ HOME_PAGE_URL }}/assets/images/cnsl-logo.jpg" />
  <meta name="twitter:image:alt" content="CNSL Columbia Neighborhood Swim League logo" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "{{ HOME_PAGE_URL }}/#website",
      "url": "{{ HOME_PAGE_URL }}/",
      "name": "CA Pool & CNSL Assistant",
      "alternateName": "CA Pools",
      "description": "Columbia Association outdoor pool and Columbia Neighborhood Swim League team information for Columbia, Maryland.",
      "about": [
        { "@type": "Thing", "name": "Columbia Association outdoor pools" },
        { "@type": "SportsOrganization", "name": "Columbia Neighborhood Swim League" }
      ],
      "inLanguage": "en-US"
    }
  </script>

  <link rel="manifest" href="manifest.webmanifest" />

  <!-- Shared providers load before every route and its deferred controllers. -->
  <script src="js/config/app-config.js"></script>
  <script src="js/services/season-service.js"></script>
  <script src="js/season-view.js"></script>
  <script src="js/types/weather-hazard.js"></script>
  <script src="js/services/icon-catalog.js"></script>
  <script src="js/services/preferences-service.js"></script>
  <script src="js/services/weather-freshness-service.js"></script>
  <script src="js/services/experimental-features-service.js"></script>
  <script src="js/preferences-theme.js"></script>
  <script src="js/types/analytics-interaction-type.js"></script>
  <script src="js/services/device-platform-service.js"></script>
  <script src="js/analytics.js"></script>

  <!-- Favicons and Touch Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
  <link rel="shortcut icon" href="assets/favicons/favicon.ico">

  <!-- Android and PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="CA Pool &amp; CNSL Assistant">

  <!-- Microsoft Tiles -->
  <meta name="msapplication-TileColor" content="#0078d4">
  <meta name="msapplication-config" content="browserconfig.xml">

  <!-- Theme and Status Bar -->
  <meta name="theme-color" content="#0078d4">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CA Pool Assistant">

  <block name="head"></block>
</head>

<body>
  <a class="skip-link" href="#mainContent">Skip to main content</a>
  <include src="components/icon-sprite.html"></include>
  <include src="components/welcome-dialog.html"></include>
  <div class="page-wrap">
    <include src="components/header.html"></include>

    <include src="components/app-subheader.html"></include>

    <div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>

    <main class="container" id="mainContent" tabindex="-1">
      <block name="content"></block>
    </main>
  </div>

  <include src="components/settings-dialog.html"></include>

  <include src="components/footer.html"></include>

  <!-- Critical navigation script must be available immediately -->
  <script src="js/navigation.js"></script>
  <script src="js/pwa.js"></script>

  <!-- Weather checks start before route-specific deferred work -->
  <script src="js/config/weather-operating-windows.js" defer></script>
  <script src="js/services/weather-alert-service.js" defer></script>
  <script src="js/weather-alert.js" defer></script>

  <block name="scripts"></block>

  <script src="js/settings-loader.js" defer></script>
</body>

</html>
